seed_everything: 42
trainer:
  accelerator: auto
  strategy: auto
  devices: 1
  num_nodes: 1
  precision: 32
  logger:
  - class_path: pytorch_lightning.loggers.CSVLogger
    init_args:
      save_dir: ./logs/rgbd/pose3d
      name: lightning_logs
      version: null
      prefix: ''
      flush_logs_every_n_steps: 100
  callbacks:
  - class_path: pytorch_lightning.callbacks.TQDMProgressBar
    init_args:
      refresh_rate: 1
      process_position: 0
      leave: false
  - class_path: pytorch_lightning.callbacks.ModelCheckpoint
    init_args:
      dirpath: null
      filename: '{epoch}'
      monitor: null
      verbose: false
      save_last: null
      save_top_k: -1
      save_weights_only: false
      mode: min
      auto_insert_metric_name: true
      every_n_train_steps: null
      train_time_interval: null
      every_n_epochs: 1
      save_on_train_epoch_end: null
      enable_version_counter: true
  fast_dev_run: false
  max_epochs: 300
  min_epochs: null
  max_steps: -1
  min_steps: null
  max_time: null
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: null
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  log_every_n_steps: 50
  enable_checkpointing: null
  enable_progress_bar: null
  enable_model_summary: null
  accumulate_grad_batches: 1
  gradient_clip_val: null
  gradient_clip_algorithm: null
  deterministic: null
  benchmark: true
  inference_mode: true
  use_distributed_sampler: true
  profiler: null
  detect_anomaly: false
  barebones: false
  plugins: null
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  default_root_dir: null
model:
  class_path: pose_estimation.pl_wrappers.Pose3DLightningModel
  init_args:
    model_cfg:
      num_frames: 1
      num_joints: 22
      to_mm: 10.0
      camera_model: egoposevr
      input_dims: 128
      embed_dims: 128
      num_former_layers: 3
      num_pred_mlp_layers: 2
      image_size:
      - 256
      - 320
      feat_down_stride: 4
      norm_mlp_pred: false
      coor_norm_max: null
      coor_norm_min: null
      temporal_cfg:
        num_layer: 3
        input_dim: 54
        output_dim: 132
        embed_dim: 256
        nhead: 8
      encoder_cfg:
        resnet_cfg:
          model_name: resnet18
          out_stride: 4
          use_imagenet_pretrain: true
        neck_cfg:
          in_channels:
          - 64
          - 128
          - 256
          - 512
          out_channels: 128
      transformer_cfg:
        # temporal_attn_cfg:
        #   num_heads: 4
        #   batch_first: true
        cross_attn_cfg:
          num_heads: 4
          batch_first: true
        spatial_attn_cfg:
          num_heads: 4
          batch_first: true
        ffn_cfg:
          feedforward_dims: 512
          num_fcs: 2
          ffn_drop: 0.0
      train_cfg:
        w_mpjpe: 0.1
      depth: True
      # temporal_pretrained: ./ckpt/hmdposer/epoch=99.ckpt
      encoder_pretrained: ./ckpt/pretrained_heatmap/epoch=19.ckpt
    dataset_type: egoposevr
    data_root: ./Datasets/EgoPoseVR_Dataset/
    lr: 0.0005
    encoder_lr_scale: 1.0
    weight_decay: 0.0005
    lr_decay_epochs:
    - 8
    - 10
    warmup_iters: 500
    batch_size: 32
    workers: 16
    dataset_kwargs: {}
data: null
optimizer: null
lr_scheduler: null
ckpt_path: null