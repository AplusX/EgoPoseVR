# pytorch_lightning==2.6.1
seed_everything: 42
trainer:
  accelerator: auto
  strategy: auto
  devices: 1
  num_nodes: 1
  precision: 32
  logger:
  - class_path: pytorch_lightning.loggers.CSVLogger
    init_args:
      save_dir: ./logs/rgbd/pose2d
      name: lightning_logs
      version: null
      prefix: ''
      flush_logs_every_n_steps: 100
  callbacks:
  - class_path: pytorch_lightning.callbacks.TQDMProgressBar
    init_args:
      refresh_rate: 1
      process_position: 0
      leave: false
  - class_path: pytorch_lightning.callbacks.ModelCheckpoint
    init_args:
      dirpath: null
      filename: '{epoch}'
      monitor: null
      verbose: false
      save_last: null
      save_top_k: -1
      save_on_exception: false
      save_weights_only: false
      mode: min
      auto_insert_metric_name: true
      every_n_train_steps: null
      train_time_interval: null
      every_n_epochs: 1
      save_on_train_epoch_end: null
      enable_version_counter: true
  fast_dev_run: false
  max_epochs: 50
  min_epochs: null
  max_steps: -1
  min_steps: null
  max_time: null
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: null
  check_val_every_n_epoch: 1
  num_sanity_val_steps: null
  log_every_n_steps: 50
  enable_checkpointing: null
  enable_progress_bar: null
  enable_model_summary: null
  accumulate_grad_batches: 1
  gradient_clip_val: null
  gradient_clip_algorithm: null
  deterministic: null
  benchmark: true
  inference_mode: true
  use_distributed_sampler: true
  profiler: null
  detect_anomaly: false
  barebones: false
  plugins: null
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  default_root_dir: null
  enable_autolog_hparams: true
  model_registry: null
model:
  class_path: pose_estimation.pl_wrappers.PoseHeatmapLightningModel
  init_args:
    model_cfg:
      num_heatmap: 22
      encoder_cfg:
        resnet_cfg:
          model_name: resnet18
          out_stride: 4
          use_imagenet_pretrain: true
        neck_cfg:
          in_channels:
          - 64
          - 128
          - 256
          - 512
          out_channels: 128
        depth: false
      train_cfg:
        w_heatmap: 10.0
    dataset_type: egoposevr
    data_root: /mnt/mysecondssd/Datasets/EgoPoseVR_Dataset
    lr: 0.001
    weight_decay: 0.005
    lr_decay_epochs:
    - 8
    - 10
    warmup_iters: 500
    batch_size: 32
    workers: 16
    dataset_kwargs: {}
data: null
optimizer: null
lr_scheduler: null
ckpt_path: null
weights_only: null
